blueprint:
  name: Tap Electric — Dynamic tariff pause
  description: >
    Pause charging whenever the electricity price goes above a threshold,
    resume when it drops below another. Typical use: Nordpool / EPEX /
    Tibber integrations as the price sensor.
  domain: automation
  source_url: https://github.com/weemaba999/tapelectric-ha
  input:
    price_sensor:
      name: Electricity price sensor
      selector:
        entity:
          filter:
            domain: sensor
    charge_allowed_switch:
      name: Charging-allowed switch
      selector:
        entity:
          filter:
            domain: switch
            integration: tapelectric
    plug_connected_sensor:
      name: Plug-connected binary sensor
      selector:
        entity:
          filter:
            domain: binary_sensor
            integration: tapelectric
    pause_above:
      name: Pause above this price
      default: 0.35
      selector:
        number: {min: 0, max: 5, step: 0.01}
    resume_below:
      name: Resume below this price
      default: 0.20
      selector:
        number: {min: 0, max: 5, step: 0.01}

trigger:
  - platform: state
    entity_id: !input price_sensor

condition:
  - condition: state
    entity_id: !input plug_connected_sensor
    state: "on"

action:
  - variables:
      price: "{{ states(!input.price_sensor) | float(0) }}"
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ price >= (!input.pause_above | float) }}"
        sequence:
          - service: switch.turn_off
            target:
              entity_id: !input charge_allowed_switch
      - conditions:
          - condition: template
            value_template: "{{ price <= (!input.resume_below | float) }}"
        sequence:
          - service: switch.turn_on
            target:
              entity_id: !input charge_allowed_switch

mode: single

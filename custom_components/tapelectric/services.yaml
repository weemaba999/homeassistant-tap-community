pause_charging:
  name: Pause charging
  description: >
    Apply a 0A charging profile, pausing any active session. The session
    continues, the charger reports SUSPENDEDEVSE, the car draws no power.
  fields:
    charger_id:
      name: Charger ID
      required: true
      selector: {text: {}}
    connector_id:
      name: Connector ID
      required: false
      default: 1
      selector: {number: {min: 1, max: 4, mode: box}}

resume_charging:
  name: Resume charging
  description: Apply a non-zero charging profile to resume power delivery.
  fields:
    charger_id:
      name: Charger ID
      required: true
      selector: {text: {}}
    limit_amps:
      name: Limit (A)
      description: Current per phase. 16A ≈ 3.7 kW 1-phase or 11 kW 3-phase.
      required: false
      default: 16
      selector: {number: {min: 6, max: 32, step: 1, unit_of_measurement: A, mode: slider}}
    connector_id:
      name: Connector ID
      required: false
      default: 1
      selector: {number: {min: 1, max: 4, mode: box}}
    number_phases:
      name: Number of phases
      required: false
      selector: {select: {options: ["1", "3"]}}

set_charging_limit:
  name: Set charging limit
  description: Set an arbitrary current limit (for dynamic tariff automations).
  fields:
    charger_id:
      name: Charger ID
      required: true
      selector: {text: {}}
    limit_amps:
      name: Limit (A)
      required: true
      selector: {number: {min: 0, max: 32, step: 1, unit_of_measurement: A, mode: slider}}
    connector_id:
      name: Connector ID
      required: false
      default: 1
      selector: {number: {min: 1, max: 4, mode: box}}
    number_phases:
      name: Number of phases
      required: false
      selector: {select: {options: ["1", "3"]}}

reset_charger:
  name: Reset charger
  description: Reboot the charger (OCPP Reset).
  fields:
    charger_id:
      name: Charger ID
      required: true
      selector: {text: {}}
    reset_type:
      name: Type
      required: false
      default: Soft
      selector: {select: {options: [Soft, Hard]}}

push_external_meter_data:
  name: Push external meter data (experimental)
  description: >
    Forward a reading from an external home energy meter to Tap's load
    balancing engine. Tested with single-meter installs only — the
    ExternalMeterData contract may vary per fleet; pass only the fields
    the Tap server expects.
  fields:
    meter_id:
      name: Meter ID
      required: true
      selector: {text: {}}
    power_w:
      name: Power (W)
      required: false
      selector: {number: {min: -100000, max: 100000, step: 1, unit_of_measurement: W}}
    energy_wh:
      name: Energy (Wh)
      required: false
      selector: {number: {min: 0, max: 100000000, step: 1, unit_of_measurement: Wh}}
    current_a:
      name: Current (A)
      required: false
      selector: {number: {min: -200, max: 200, step: 0.1, unit_of_measurement: A}}
    voltage_v:
      name: Voltage (V)
      required: false
      selector: {number: {min: 0, max: 500, step: 0.1, unit_of_measurement: V}}
    measured_at:
      name: Measured at
      required: false
      selector: {datetime: {}}
